version: 2

project_name: ffly

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: ffly
    main: ./cmd/ffly
    binary: ffly
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/functionfly/fly/internal/version.Version={{ .Version }}
      - -X github.com/functionfly/fly/internal/version.Commit={{ .Commit }}
      - -X github.com/functionfly/fly/internal/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true
  - id: windows-zip
    formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true
    builds:
      - ffly

nfpms:
  - id: linux-packages
    package_name: ffly
    maintainer: FunctionFly <support@functionfly.com>
    homepage: https://functionfly.com
    description: FunctionFly CLI — Go from idea to global API in under 60 seconds
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin

brews:
  - name: ffly
    repository:
      owner: functionfly
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://functionfly.com
    description: FunctionFly CLI — Go from idea to global API in under 60 seconds
    license: Apache-2.0
    ids:
      - default
    skip_upload: auto
    install: |
      bin.install "ffly"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: functionfly
    name: fly
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  header: |
    ## FunctionFly CLI {{ .Tag }}

    Install the latest version:
    ```bash
    curl -fsSL https://raw.githubusercontent.com/functionfly/fly/main/scripts/install.sh | bash
    ```

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other Changes
      order: 999
