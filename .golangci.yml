version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gofmt
    - goimports
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/functionfly/fly
  revive:
    rules:
      - name: exported
        severity: warning
  gocritic:
    disabled-checks:
      - appendAssign

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
    - path: internal/testing/
      linters:
        - revive
  max-issues-per-linter: 0
  max-same-issues: 0
